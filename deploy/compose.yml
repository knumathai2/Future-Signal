name: future-signal

services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      ENV: production
      CORS_ORIGINS: https://osignal.gilgop.cloud
      DB_POOL_SIZE: ${DB_POOL_SIZE:-3}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-1}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-10}
      DATABASE_URL: ${DATABASE_URL:-}
      AI_GENERATION_WORKERS_ENABLED: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      SCENARIO_CONVERSATION_ENABLED: "true"
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).status==200 else 1)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app
      - egress

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8600:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app
      - edge

networks:
  app:
    internal: true
  egress:
  edge:

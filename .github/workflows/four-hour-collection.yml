name: Four-hour market data collection

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

jobs:
  four-hour-collection:
    runs-on: ubuntu-latest
    env:
      ENV: dev
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run market data collection
        working-directory: backend
        run: |
          python -m app.core.scheduled_batch \
            --use-live-fetch \
            --max-samples 50 \
            --skip-ai-reports \
            --skip-context-research \
            --confirm-local-dev-write
